<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" style="background:#000">
  <defs>
    <clipPath id="outerClip">
      <circle cx="256" cy="256" r="230"/>
    </clipPath>
  </defs>

  <g clip-path="url(#outerClip)">
    <!-- Yellow: top-left segment -->
    <path d="M256,256 L256,26 A230,230 0 0,1 455.1,141 Z" fill="#D4A017"/>
    <!-- Teal: top-right segment -->
    <path d="M256,256 L455.1,141 A230,230 0 0,1 455.1,371 Z" fill="#1E8EA0"/>
    <!-- Red: right segment -->
    <path d="M256,256 L455.1,371 A230,230 0 0,1 256,486 Z" fill="#C0392B"/>
    <!-- Green: bottom-right segment -->
    <path d="M256,256 L256,486 A230,230 0 0,1 56.9,371 Z" fill="#1E8B4A"/>
    <!-- Blue: bottom-left segment -->
    <path d="M256,256 L56.9,371 A230,230 0 0,1 56.9,141 Z" fill="#2471C8"/>
    <!-- Purple: left segment -->
    <path d="M256,256 L56.9,141 A230,230 0 0,1 256,26 Z" fill="#9B27AF"/>
  </g>

  <!-- Dividing lines between segments -->
  <g stroke="#1a1a2e" stroke-width="6" clip-path="url(#outerClip)">
    <line x1="256" y1="256" x2="256" y2="26"/>
    <line x1="256" y1="256" x2="455.1" y2="141"/>
    <line x1="256" y1="256" x2="455.1" y2="371"/>
    <line x1="256" y1="256" x2="256" y2="486"/>
    <line x1="256" y1="256" x2="56.9" y2="371"/>
    <line x1="256" y1="256" x2="56.9" y2="141"/>
  </g>

  <!-- Center dark circle -->
  <circle cx="256" cy="256" r="100" fill="#1e2230"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="85" fill="none" stroke="#4a5068" stroke-width="6"/>
  <!-- Innermost circle -->
  <circle cx="256" cy="256" r="72" fill="#181c27"/>
</svg>
